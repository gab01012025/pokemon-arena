<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Arena — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:20px}
    .container{max-width:420px}
    .pokeball{width:80px;height:80px;margin:0 auto 24px;position:relative;animation:bounce 2s ease-in-out infinite}
    .pokeball::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(180deg,#DC0A2D 50%,#fff 50%);border:4px solid #333}
    .pokeball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;border:4px solid #333;z-index:1}
    h1{font-size:1.8rem;margin-bottom:8px;background:linear-gradient(135deg,#FFD700,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    p{color:rgba(255,255,255,0.7);margin-bottom:24px;line-height:1.6}
    .btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a1a2e;font-weight:700;border:none;border-radius:50px;cursor:pointer;font-size:1rem;text-decoration:none;transition:transform .2s}
    .btn:hover{transform:scale(1.05)}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  </style>
</head>
<body>
  <div class="container">
    <div class="pokeball"></div>
    <h1>You're Offline!</h1>
    <p>It looks like your connection dropped. Check your internet and try again — your Pokémon team is waiting!</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
